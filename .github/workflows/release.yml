name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  cli:
    name: CLI (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macos-aarch64
            os: macos-latest
            target: aarch64-apple-darwin
            archive: tar.gz
            exe_suffix: ""
          - name: linux-x86_64
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: tar.gz
            exe_suffix: ""
          - name: windows-x86_64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: zip
            exe_suffix: ".exe"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust target
        shell: bash
        run: rustup target add "${{ matrix.target }}"

      - name: Build CLI
        shell: bash
        run: cargo build --release -p worklog-cli --target "${{ matrix.target }}"

      - name: Package CLI
        shell: bash
        run: |
          set -euxo pipefail
          mkdir -p dist
          bin="worklog${{ matrix.exe_suffix }}"
          cp "target/${{ matrix.target }}/release/${bin}" "dist/${bin}"
          cd dist
          if [ "${{ matrix.archive }}" = "zip" ]; then
            7z a "worklog-cli-${{ matrix.target }}.zip" "${bin}"
            rm "${bin}"
          else
            tar -czf "worklog-cli-${{ matrix.target }}.tar.gz" "${bin}"
            rm "${bin}"
          fi

      - name: Upload CLI artifact
        uses: actions/upload-artifact@v4
        with:
          name: cli-${{ matrix.name }}
          path: dist/*
          if-no-files-found: error

  desktop-macos:
    name: Desktop DMG (macOS)
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - name: Install frontend dependencies
        working-directory: desktop
        run: npm ci

      - name: Build DMG
        working-directory: desktop
        run: npm run tauri -- build --bundles dmg --no-sign --ci

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: desktop-macos-dmg
          path: target/release/bundle/dmg/*.dmg
          if-no-files-found: error

  desktop-windows:
    name: Desktop EXE (Windows)
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - name: Install frontend dependencies
        working-directory: desktop
        run: npm ci

      - name: Build NSIS installer
        working-directory: desktop
        run: npm run tauri -- build --bundles nsis --no-sign --ci

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: desktop-windows-exe
          path: target/release/bundle/nsis/*.exe
          if-no-files-found: error

  publish-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs:
      - cli
      - desktop-macos
      - desktop-windows
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Publish assets
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          set -euxo pipefail
          ls -lah release-assets
          if gh release view "${TAG_NAME}" >/dev/null 2>&1; then
            gh release upload "${TAG_NAME}" release-assets/* --clobber
          else
            gh release create "${TAG_NAME}" release-assets/* \
              --title "${TAG_NAME}" \
              --generate-notes
          fi
